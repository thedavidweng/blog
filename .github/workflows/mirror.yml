name: Mirror to Codeberg

on:
  push:
    branches: ["main"]
    tags: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    name: Mirror
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Mirror to Codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          git remote add codeberg "https://thedavidweng:${CODEBERG_TOKEN}@codeberg.org/thedavidweng/blog"
          git push codeberg main --force
          git push codeberg --tags --force
